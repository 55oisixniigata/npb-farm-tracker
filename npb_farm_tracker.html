<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPBファーム 集客トラッカー 2026</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Bebas+Neue&display=swap');
:root{--bg:#0a0c12;--surface:#12151f;--surface2:#1a1e2e;--border:#252a3d;--accent:#e8c84a;--accent2:#4a8fe8;--text:#f0f2ff;--muted:#6b728f;--green:#4ae8a0;--red:#e84a6b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:14px;flex-wrap:wrap;gap:10px}
header h1{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:.04em;color:var(--accent)}
.header-right{display:flex;align-items:center;gap:12px}
.last-updated{font-size:.75rem;color:var(--muted)}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid #0003;border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.stat-label{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:5px}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;color:var(--accent);line-height:1}
.stat-value span{font-family:'Noto Sans JP';font-size:.9rem}
.stat-sub{font-size:.72rem;color:var(--muted);margin-top:3px}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.chart-panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.chart-panel.full{grid-column:1/-1}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:6px}
.chart-title{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700}
.tab-group{display:flex;flex-wrap:wrap;gap:3px}
.tab{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:3px 9px;font-size:.7rem;border-radius:4px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s}
.tab.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
canvas{max-height:240px}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.7rem;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:50%}
.table-panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:20px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{text-align:left;padding:6px 10px;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border)}
td{padding:7px 10px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.team-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;flex-shrink:0}
.log-panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.log-title{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:10px}
.log-item{font-size:.75rem;padding:4px 0;border-bottom:1px solid var(--border);color:var(--muted);display:flex;gap:8px}
.log-item:last-child{border-bottom:none}
.log-time{color:var(--muted);flex-shrink:0;min-width:80px}
.log-ok{color:var(--green)}
.log-err{color:var(--red)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;font-weight:700;padding:9px 20px;border-radius:20px;font-size:.85rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999}
.toast.show{opacity:1}
@media(max-width:800px){.stats-row{grid-template-columns:repeat(2,1fr)}.charts-grid{grid-column:1/-1;grid-template-columns:1fr}}
</style>
</head>

<header>

<div class="log-panel">

// ── ストレージ ──
function loadEntries() {
  return INITIAL_DATA.map(d => ({...d}));
}

let entries = loadEntries();
let barMode = 'total';
let lineTeam = null;
let barChart, oppChart, lineChart, yoyChart;


// ── 描画 ──
function render() {
  renderStats();
  renderBarChart();
  renderTeamTabs();
  renderLineChart();
  renderYoYChart();
  renderTable();
  renderLog();
  const latestDate = entries.reduce((m,e) => e.date > m ? e.date : m, '');
  document.getElementById('last-updated').textContent = latestDate ? '最終更新: ' + latestDate : '読込中...';
}

function teamStats() {
  const stats = {};
  entries.forEach(e => {
    if (!stats[e.home]) stats[e.home]={total:0,count:0,max:0,min:Infinity};
    stats[e.home].total += e.audience;
    stats[e.home].count++;
    stats[e.home].max = Math.max(stats[e.home].max, e.audience);
    stats[e.home].min = Math.min(stats[e.home].min, e.audience);
  });
  return stats;
}

function renderStats() {
  const stats = teamStats();
  const total = entries.reduce((s,e)=>s+e.audience,0);
  const cnt = entries.length;
  const avg = cnt>0 ? Math.round(total/cnt) : 0;
  const top = Object.entries(stats).sort((a,b)=>b[1].total-a[1].total)[0];
  const dates = [...new Set(entries.map(e=>e.date))];
  const lastDate = entries[entries.length-1]?.date?.slice(5).replace('-','/') || '—';
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-label">総入場者数</div>
      <div class="stat-value">${total>=10000?(total/10000).toFixed(1)+'<span>万</span>':total.toLocaleString()}<span>人</span></div>
      <div class="stat-sub">${cnt}試合・${dates.length}日間</div></div>
    <div class="stat-card"><div class="stat-label">平均入場者数</div>
      <div class="stat-value">${avg.toLocaleString()}<span>人</span></div>
      <div class="stat-sub">1試合あたり</div></div>
    <div class="stat-card"><div class="stat-label">最多集客チーム</div>
      <div class="stat-value" style="font-size:1.3rem;font-family:'Noto Sans JP';font-weight:900;color:${TEAMS_COLOR[top?.[0]]||'var(--accent)'}">${top?.[0]||'—'}</div>
      <div class="stat-sub">${top?.[1].total.toLocaleString()||0}人累計</div></div>
    <div class="stat-card"><div class="stat-label">最新データ</div>
      <div class="stat-value" style="font-size:1.1rem;font-family:'Noto Sans JP';font-weight:700">〜${lastDate}</div>
      <div class="stat-sub">開幕3/14〜</div></div>`;
}

function switchBar(mode, btn) {
  barMode = mode;
  document.getElementById('bar-tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderBarChart();
}

function renderBarChart() {
  const stats = teamStats();
  const sorted = Object.entries(stats).sort((a,b)=>b[1].total-a[1].total);
  const labels = sorted.map(([t])=>t);
  const data = sorted.map(([,s])=>barMode==='total'?s.total:Math.round(s.total/s.count));
  const colors = labels.map(t=>TEAMS_COLOR[t]||'#888');
  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('barChart'),{
    type:'bar',data:{labels,datasets:[{data,backgroundColor:colors.map(c=>c+'bb'),borderColor:colors,borderWidth:1.5,borderRadius:4}]},
    options:{responsive:true,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#6b728f',font:{family:'Noto Sans JP',size:10}},grid:{color:'#1a1e2e'}},
              y:{ticks:{color:'#6b728f',font:{family:'Noto Sans JP',size:10}},grid:{color:'#252a3d'}}}}
  });
  document.getElementById('bar-legend').innerHTML = sorted.map(([t])=>
    `<div class="legend-item"><div class="legend-dot" style="background:${TEAMS_COLOR[t]||'#888'}"></div>${t}</div>`
  ).join('');
}

function renderYoYChart() {
  const stats2026 = teamStats();
  const teams = Object.keys(GAMES_2025).filter(t => stats2026[t] && stats2026[t].count > 0);

  // 2026年の試合数分の2025年累計を計算
  const result = teams.map(t => {
    const n = stats2026[t].count;
    const games2025 = GAMES_2025[t] || [];
    const sliced = games2025.slice(0, n);
    const total2025atN = sliced.reduce((s,v)=>s+v, 0);
    const avg2025atN = sliced.length > 0 ? Math.round(total2025atN / sliced.length) : 0;
    const total2026 = stats2026[t].total;
    const avg2026 = Math.round(total2026 / n);
    const ratio = avg2025atN > 0 ? Math.round(avg2026 / avg2025atN * 100) : 100;
    return { team: t, avg2026, avg2025atN, ratio, n };
  });

  // 昨年比降順にソート
  result.sort((a,b) => b.ratio - a.ratio);

  const labels = result.map(r => r.team);
  const avg2026vals = result.map(r => r.avg2026);
  const avg2025vals = result.map(r => r.avg2025atN);
  const teamColors = labels.map(t => TEAMS_COLOR[t] || '#888');

  if (yoyChart) yoyChart.destroy();
  yoyChart = new Chart(document.getElementById('yoyChart'), {
    type:'bar',
    data:{
      labels,
      datasets:[
        {
          label:'2026年 平均',
          data: avg2026vals,
          backgroundColor: teamColors.map(c=>c+'99'),
          borderColor: teamColors,
          borderWidth:1.5, borderRadius:4,
          yAxisID:'y'
        },
        {
          label:'2025年 同試合数時点平均',
          data: avg2025vals,
          type:'line',
          borderColor:'#ffffff66',
          borderWidth:2,
          borderDash:[5,4],
          pointRadius:4,
          pointBackgroundColor:'#ffffffaa',
          fill:false,
          yAxisID:'y'
        }
      ]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{display:true, labels:{color:'#6b728f',font:{family:'Noto Sans JP',size:10}}},
        tooltip:{callbacks:{
          label: ctx => {
            const r = result[ctx.dataIndex];
            if (ctx.datasetIndex === 0) {
              const sign = r.ratio >= 100 ? '+' : '';
              return `2026: ${r.avg2026.toLocaleString()}人  昨年同${r.n}試合比 ${sign}${r.ratio-100}%`;
            }
            return `2025同時点: ${r.avg2025atN.toLocaleString()}人（${r.n}試合平均）`;
          }
        }}
      },
      scales:{
        x:{ticks:{color:'#6b728f',font:{family:'Noto Sans JP',size:10}},grid:{color:'#1a1e2e'}},
        y:{ticks:{color:'#6b728f',font:{family:'Noto Sans JP',size:10}},grid:{color:'#252a3d'}}
      }
    }
  });
}

function renderTeamTabs() {
  const stats=teamStats();
  const teams=Object.keys(stats).sort((a,b)=>stats[b].total-stats[a].total);
  if (!lineTeam||!stats[lineTeam]) lineTeam=teams[0];
  document.getElementById('team-tabs').innerHTML=teams.map(t=>{
    const active=t===lineTeam;
    const c=TEAMS_COLOR[t]||'var(--accent)';
    return `<button class="tab${active?' active':''}" onclick="selectTeam('${t}',this)"
      style="${active?`background:${c};border-color:${c};color:#000`:''}">${t}</button>`;
  }).join('');
}

function selectTeam(team, btn) {
  lineTeam=team;
  document.getElementById('team-tabs').querySelectorAll('.tab').forEach(t=>{
    t.classList.remove('active');t.style.background='';t.style.borderColor='';t.style.color='';
  });
  btn.classList.add('active');
  const c=TEAMS_COLOR[team]||'var(--accent)';
  btn.style.background=c;btn.style.borderColor=c;btn.style.color='#000';
  renderLineChart();
}

function renderLineChart() {
  if (!lineTeam) return;
  const c=TEAMS_COLOR[lineTeam]||'#e8c84a';
  const games=entries.filter(e=>e.home===lineTeam).sort((a,b)=>a.date.localeCompare(b.date));
  if (lineChart) lineChart.destroy();
  lineChart=new Chart(document.getElementById('lineChart'),{
    type:'line',
    data:{labels:games.map(g=>g.date.slice(5).replace('-','/')+' vs '+g.away),
      datasets:[{label:lineTeam,data:games.map(g=>g.audience),
        borderColor:c,backgroundColor:c+'22',borderWidth:2.5,pointRadius:4,tension:0.3,fill:true}]},
    options:{responsive:true,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y.toLocaleString()}人`}}},
      scales:{x:{ticks:{color:'#6b728f',font:{family:'Noto Sans JP',size:10},maxRotation:40},grid:{color:'#1a1e2e'}},
              y:{ticks:{color:'#6b728f',font:{family:'Noto Sans JP',size:10}},grid:{color:'#252a3d'}}}}
  });
}

function renderTable() {
  const stats=teamStats();
  const sorted=Object.entries(stats).sort((a,b)=>b[1].total-a[1].total);
  document.querySelector('#summary-table tbody').innerHTML=sorted.map(([team,s])=>`
    <tr><td><span class="team-dot" style="background:${TEAMS_COLOR[team]||'#888'}"></span>${team}</td>
    <td style="color:var(--muted)">${s.count}</td>
    <td style="font-weight:700">${s.total.toLocaleString()}</td>
    <td>${Math.round(s.total/s.count).toLocaleString()}</td>
    <td style="color:var(--green)">${s.max.toLocaleString()}</td>
    <td style="color:var(--muted)">${s.min.toLocaleString()}</td></tr>`).join('');
}

function renderLog() {
  const list = document.getElementById('log-list');
  if (!UPDATE_LOG || UPDATE_LOG.length === 0) {
    list.innerHTML = '<div style="color:var(--muted);font-size:.8rem">ログなし</div>';
    return;
  }
  list.innerHTML = [...UPDATE_LOG].reverse().slice(0, 20).map(l =>
    `<div class="log-item"><span class="log-time">${l.date}</span><span class="log-msg log-ok">${l.msg}</span></div>`
  ).join('');
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

render();
</script>
</body>
</html>
