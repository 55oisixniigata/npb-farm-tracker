name: NPBファーム 集客データ自動更新

on:
  schedule:
    # 毎日 JST 15:00 に実行（UTC 06:00）
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests beautifulsoup4

      - name: スクレイピング実行
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/scraper.py

      - name: index.html を更新
        run: python scripts/build_html.py

      - name: 変更をコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json oisix_home.csv
          git diff --cached --quiet || git commit -m "📊 データ自動更新 $(date +'%Y-%m-%d')"
          git pull --rebase && git push
